<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Name</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="card">
    <div class="inner-border">
      <img src="profile.jpg" alt="Portrait of Your Name" class="profile">

      <p class="eyebrow">Artist • Handmade • Vintage Inspired</p>
      <h1>Your Name</h1>
      <p class="tagline">
        A small corner of the internet for my art, projects, and social links.
      </p>

      <nav class="links">
        <a href="https://instagram.com/yourname" target="_blank" rel="noopener noreferrer">Instagram</a>
        <a href="https://facebook.com/yourname" target="_blank" rel="noopener noreferrer">Facebook</a>
        <a href="https://youtube.com/@yourname" target="_blank" rel="noopener noreferrer">YouTube</a>
        <a href="https://tiktok.com/@yourname" target="_blank" rel="noopener noreferrer">TikTok</a>
        <a href="mailto:youremail@example.com">Email</a>
      </nav>
    </div>
  </main>

<script src='https://storage.ko-fi.com/cdn/scripts/overlay-widget.js'></script>
<script>
  kofiWidgetOverlay.draw('athenagoulet', {
    'type': 'floating-chat',
    'floating-chat.donateButton.text': 'Support me',
    'floating-chat.donateButton.background-color': '#fcbf47',
    'floating-chat.donateButton.text-color': '#323842'
  });
</script>

</body>
</html>
