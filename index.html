<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Athena Goulet</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="card">
    <div class="inner-border">
      <img src="profile.jpg" alt="Portrait of Athena Goulet" class="profile">

      <p class="eyebrow">Artist • Handmade • Indiana</p>
      <h1>Athena Goulet</h1>
      <p class="tagline">
        A small corner of the internet for my art, projects, and social links.
      </p>

      <nav class="links" aria-label="Social media links">
        <a href="https://www.instagram.com/athenasmysticbog/" target="_blank" rel="noopener noreferrer">Instagram</a>
        <a href="https://www.facebook.com/athenamoonshine" target="_blank" rel="noopener noreferrer">Facebook</a>
        <a href="https://www.youtube.com/@AthenaGoulet" target="_blank" rel="noopener noreferrer">YouTube</a>
        <a href="https://open.spotify.com/user/1290746307" target="_blank" rel="noopener noreferrer">Spotify</a>
      </nav>
    </div>
  </main>

  <script src="https://storage.ko-fi.com/cdn/scripts/overlay-widget.js"></script>
  <script>
    kofiWidgetOverlay.draw('athenagoulet', {
      'type': 'floating-chat',
      'floating-chat.donateButton.text': 'Support me',
      'floating-chat.donateButton.background-color': '#fcbf47',
      'floating-chat.donateButton.text-color': '#323842'
    });
  </script>
<p class="tagline">Contact me via Instagram or Ko-fi.</p>
</body>
</html>
